<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2FA Authenticator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Toolbar -->
    <header class="toolbar" data-wails-drag>
      <div class="toolbar-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="11" width="14" height="10" rx="2"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          <circle cx="12" cy="16" r="1" fill="currentColor" stroke="none"/>
        </svg>
        <span>2FA Authenticator</span>
      </div>
      <button class="btn-add" id="btnAdd" title="Add account">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add
      </button>
    </header>

    <!-- Account cards list -->
    <main class="cards-container" id="cardsContainer">
      <div class="empty-state" id="emptyState">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
          <rect x="5" y="11" width="14" height="10" rx="2"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          <circle cx="12" cy="16" r="1" fill="currentColor" stroke="none"/>
        </svg>
        <p>No accounts yet</p>
        <span>Click <strong>+ Add</strong> to add your first 2FA account</span>
      </div>
    </main>

    <!-- Add account modal -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-header">
          <h2>Add Account</h2>
          <button class="btn-close" id="btnCloseModal" title="Close">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label for="fieldName">Account name *</label>
            <input type="text" id="fieldName" placeholder="e.g. work@example.com" autocomplete="off" />
          </div>
          <div class="field">
            <label for="fieldIssuer">Issuer (optional)</label>
            <input type="text" id="fieldIssuer" placeholder="e.g. GitHub, Google" autocomplete="off" />
          </div>
          <div class="field">
            <label for="fieldSecret">TOTP Secret *</label>
            <input type="text" id="fieldSecret" placeholder="Base32 secret key" autocomplete="off" />
          </div>
          <p class="modal-error" id="modalError"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" id="btnCancelModal">Cancel</button>
          <button class="btn-save" id="btnSaveAccount">Save Account</button>
        </div>
      </div>
    </div>

    <!-- Delete confirm modal -->
    <div class="modal-overlay" id="deleteOverlay">
      <div class="modal modal--sm">
        <div class="modal-header">
          <h2>Delete Account</h2>
        </div>
        <div class="modal-body">
          <p class="confirm-text">Are you sure you want to delete <strong id="deleteAccountName"></strong>? This cannot be undone.</p>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" id="btnCancelDelete">Cancel</button>
          <button class="btn-danger" id="btnConfirmDelete">Delete</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
